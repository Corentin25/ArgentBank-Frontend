swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      #produces:
       # - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /accounts/{accountId}/transactions:
    get:
      tags:
        - Transaction Module
      summary: Account Transaction API
      description: API for retrieve transactions from an account
      security:
        - Bearer: []
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The unique identifier of the bank account
      produces:
        - application/json
      responses:
        '200':
          description: Transactions successfully recovered
          schema:
            type: array
            items:
              $ref: '#/definitions/Transaction'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /accounts/{accountId}/transactions/{id}:
    get:
      tags:
        - Transaction Module
      summary: Single Account Transaction API
      description: API for retrieve a single account transaction
      security:
        - Bearer: []
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The unique identifier of the bank account
        - in: path
          name: id
          required: true
          type: string
          description: The unique identifier for retrieve a single account transaction
      produces:
        - application/json
      responses:
        '200':
          description: Single transaction successfully recovered
          schema:
            $ref: '#/definitions/Transaction'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      tags:
        - Transaction Module
      summary: Updating transaction API
      description: API for updating a transaction's details
      security:
        - Bearer: []
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The unique identifier of the bank account
        - in: path
          name: id
          required: true
          type: string
          description: The unique identifier for retrieve a single account transaction
        - in: body
          name: body
          description: Update category and custom notes for a transaction
          required: true
          schema:
            $ref: '#/definitions/TransactionUpdate'
      produces:
        - application/json
      responses:
        '200':
          description: Transaction updated successfully
          schema:
            $ref: '#/definitions/Transaction'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  User:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
      userName:
        type: string
        description: user public name
  Login:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      userName:
        type: string
  Transaction:
    type: object
    properties:
      id:
        type: string
        description: Unique transaction identifier
      date:
        type: string
        format: date
        description: Transaction date
      description:
        type: string
        description: Transaction Description
      amount:
        type: number
        description: Transaction amount
      balance:
        type: number
        description: Transaction balance
      transactionType:
        type: string
        description: Transaction type
      category:
        type: string
        description: Transaction category
      customNotes:
        type: string
        description: Transaction note
  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        description: Nouvelle catégorie attribuée par l'utilisateur
      customNotes:
        type: string
        description: Nouvelles notes personnalisées de l'utilisateur
